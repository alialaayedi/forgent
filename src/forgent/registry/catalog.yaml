# Curated agent registry — hand-picked from the top GitHub repos.
#
# Selection criteria:
#   1. Coverage breadth — every major engineering / product / research domain
#      should have at least one strong agent.
#   2. Source repo authority — preference for high-star, actively maintained,
#      and community-vetted definitions.
#   3. Definition quality — clear "use when" triggers, structured prompts,
#      not bloated.
#
# Sources (cloned under sources/):
#   - voltagent-subagents:  VoltAgent/awesome-claude-code-subagents
#   - wshobson-agents:      wshobson/agents (32.7k+ stars)
#   - furai-subagents:      0xfurai/claude-code-subagents (138 experts)
#   - lastmile-mcp-agent:   lastmile-ai/mcp-agent (workflow patterns)

