<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="forgent — grow your own AI subagents on demand">
  <title>forgent</title>
  <desc>GitHub social preview / og:image. 1280x640 — the size GitHub renders when the repo URL is shared on Twitter, LinkedIn, Discord, etc.</desc>

  <defs>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#eb5160"/>
      <stop offset="60%"  stop-color="#b7999c"/>
      <stop offset="100%" stop-color="#dfe0e2"/>
    </linearGradient>
    <radialGradient id="sparkOrb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#eb5160" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#eb5160" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#eb5160" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#071013"/>

  <!-- Subtle horizontal grid -->
  <g stroke="#0e1a1f" stroke-width="1">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#spark)"/>

  <!-- Glow orb on the right -->
  <circle cx="1040" cy="320" r="280" fill="url(#sparkOrb)"/>
  <circle cx="1040" cy="320" r="60"  fill="#eb5160"/>
  <circle cx="1040" cy="320" r="90"  fill="none" stroke="#eb5160" stroke-width="2" opacity="0.5"/>
  <circle cx="1040" cy="320" r="130" fill="none" stroke="#eb5160" stroke-width="2" opacity="0.3"/>
  <circle cx="1040" cy="320" r="180" fill="none" stroke="#eb5160" stroke-width="2" opacity="0.15"/>

  <!-- Wordmark -->
  <text
    x="80" y="340"
    font-family="ui-sans-serif, system-ui, -apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="220"
    font-weight="800"
    fill="#dfe0e2"
    letter-spacing="-10">forgent</text>

  <!-- Tagline -->
  <text
    x="84" y="410"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="34"
    font-weight="500"
    fill="#aaaaaa"
    letter-spacing="0.5">grow your own AI subagents on demand</text>

  <!-- Sub-tagline (the killer line) -->
  <text
    x="84" y="460"
    font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#b7999c">routes any task across Claude Code, Python frameworks, and MCP servers</text>

  <!-- Code sample -->
  <rect x="80" y="500" width="700" height="56" rx="8" fill="#0e1a1f" stroke="#b7999c" stroke-width="1"/>
  <text
    x="100" y="536"
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="20"
    font-weight="500"
    fill="#dfe0e2">$ forgent forge "design SAML 2.0 SSO with Okta"</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="634" width="1280" height="6" fill="url(#spark)"/>
</svg>
